openapi: 3.0.4
info:
  title: Track to Buy - OpenAPI 3.1
  description: |-
    Routes for single tasks and Lambda functions integrations
  contact:
    email: hello@tracktobuy.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.12
x-amazon-apigateway-cors:
  allowOrigins:
    - "https://app.tracktobuy.com"
    - "https://tracktobuy.com"
    - "http://localhost"
    - "http://localhost:8080"
    - "http://localhost:3000"
  allowMethods:
    - GET
    - POST
    - OPTIONS
  allowHeaders:
    - Content-Type
    - Authorization
  maxAge: 300
security:
  - bearerAuth: []
tags:
  - name: Email Subscription
    description: Routes for email subscription like newsletter, updates and others
  - name: Groups
    description: Routes for group management, including labels
  - name: Items
    description: Routes for item management and retrieval
paths:
  /api/v1/mail-subscriptions:
    post:
      tags:
        - Email Subscription
      summary: Add new email to subscription database.
      description: Add new email to subscription database.
      operationId: addSubscription
      requestBody:
        description: Add new email to subscription database
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MailSubscription"
        required: true
      responses:
        "201":
          description: Successful created
        "400":
          description: Invalid input
        "500":
          description: Service unavailable
      x-amazon-apigateway-integration:
        uri: arn:aws:apigateway:us-east-2:lambda:path/2015-03-31/functions/arn:aws:lambda:us-east-2:947434607925:function:ttb-email-function/invocations
        httpMethod: POST
        type: aws_proxy
        passthroughBehavior: when_no_match
        payloadFormatVersion: "2.0"
    get:
      tags:
        - Email Subscription
      summary: Returns all the emails subscribed to the newsletter.
      description: Returns all the emails subscribed to the newsletter.
      operationId: getSubscriptions
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MailSubscription"
      x-amazon-apigateway-integration:
        uri: arn:aws:apigateway:us-east-2:lambda:path/2015-03-31/functions/arn:aws:lambda:us-east-2:947434607925:function:ttb-email-function/invocations
        httpMethod: POST
        type: aws_proxy
        passthroughBehavior: when_no_match
        payloadFormatVersion: "2.0"
  /api/v1/groups/{groupId}/labels:
    get:
      tags:
        - Groups
      summary: Returns labels associated with a group.
      description: Returns the group details and all labels associated with the
        specified group.
      operationId: getGroupLabels
      parameters:
        - name: groupId
          in: path
          required: true
          description: The unique identifier (UUID) of the group.
          schema:
            type: string
            format: uuid
            example: 019d91b3-12ab-773e-8f54-5162f6d87e56
        - name: Authorization
          in: header
          required: true
          description: Bearer JWT token for authentication.
          schema:
            type: string
            example: Bearer <token_jwt>
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupLabelsResponse"
        "401":
          description: Unauthorized - JWT token is missing or invalid
        "403":
          description: Forbidden - JWT token is expired or does not have permission
        "404":
          description: Group not found
        "500":
          description: Service unavailable
  /api/v1/groups/{groupId}/items:
    get:
      tags:
        - Groups
      summary: Returns items associated with a group.
      description: Returns all items associated with the specified group.
      operationId: getGroupItems
      parameters:
        - name: groupId
          in: path
          required: true
          description: The unique identifier (UUID) of the group.
          schema:
            type: string
            format: uuid
            example: 019d91b3-12ab-773e-8f54-5162f6d87e56
        - name: Authorization
          in: header
          required: true
          description: Bearer JWT token for authentication.
          schema:
            type: string
            example: Bearer <token_jwt>
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupItemsResponse"
        "401":
          description: Unauthorized - JWT token is missing or invalid
        "403":
          description: Forbidden - JWT token is expired or does not have permission
        "404":
          description: Group not found
        "500":
          description: Service unavailable
  /api/v1/items:
    post:
      tags:
        - Items
      summary: Add a new item to the database.
      description: Creates a new item entry in the database with the provided URL,
        title, price, currency, image, domain, and store information.
      operationId: createItem
      parameters:
        - name: Authorization
          in: header
          required: true
          description: Bearer JWT token for authentication.
          schema:
            type: string
            example: Bearer <token_jwt>
      requestBody:
        description: Item data to be added to the database
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateItemRequest"
      responses:
        "201":
          description: Item successfully created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SingleItemResponse"
        "401":
          description: Unauthorized - JWT token is missing or invalid
        "403":
          description: Forbidden - JWT token is expired or does not have permission
        "500":
          description: Service unavailable
  /api/v1/items/{itemId}:
    get:
      tags:
        - Items
      summary: Returns details of a single item.
      description: Returns the full details of a specific item by its unique identifier.
      operationId: getItemById
      parameters:
        - name: itemId
          in: path
          required: true
          description: The unique identifier (UUID) of the item.
          schema:
            type: string
            example: 019da83b-bc10-749g-8277-6bcde37013e0
        - name: Authorization
          in: header
          required: true
          description: Bearer JWT token for authentication.
          schema:
            type: string
            example: Bearer <token_jwt>
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SingleItemResponse"
        "401":
          description: Unauthorized - JWT token is missing or invalid
        "403":
          description: Forbidden - JWT token is expired or does not have permission
        "404":
          description: Item not found
        "500":
          description: Service unavailable
    delete:
      tags:
        - Items
      summary: Deletes an item by its unique identifier.
      description: Permanently removes a specific item identified by its UUID.
      operationId: deleteItemById
      parameters:
        - name: itemId
          in: path
          required: true
          description: The unique identifier (UUID) of the item to be deleted.
          schema:
            type: string
            example: 019da83b-bc10-749g-8277-6bcde37013e0
        - name: Authorization
          in: header
          required: true
          description: Bearer JWT token for authentication.
          schema:
            type: string
            example: Bearer <token_jwt>
      responses:
        "204":
          description: No Content - Item successfully deleted
        "401":
          description: Unauthorized - JWT token is missing or invalid
        "403":
          description: Forbidden - JWT token is expired or does not have permission
        "404":
          description: Item not found
        "500":
          description: Service unavailable

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CreateItemRequest:
      required:
        - url
        - title
        - price
        - currency
        - image
        - domain
        - store
        - groupId
      type: object
      properties:
        url:
          type: string
          format: uri
          example: https://www.site.com
        title:
          type: string
          example: "Lenovo V4 GEN 5 (14` Intel)"
        price:
          type: number
          format: float
          example: 5174.99
        currency:
          type: string
          example: BRL
        image:
          type: string
          format: uri
          example: https://www.site.com/image.png
        domain:
          type: string
          example: site.com
        store:
          type: string
          example: Lenovo.com
        groupId:
          type: string
          format: uuid
          example: 019d91b3-12ab-773e-8f54-5162f6d87e56
    ItemStoreDetail:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
          example: 019db1b3-3e32-7e72-9f28-c039a9aeac55
        version:
          type: integer
          example: 1
        price:
          type: number
          format: float
          example: 5174.99
        shippingCost:
          type: number
          format: float
          example: 0.0
        currency:
          type: string
          example: BRL
        domain:
          type: string
          example: site.com
        storeName:
          type: string
          example: Lenovo.com
        bestOption:
          type: boolean
          example: false
        url:
          type: string
          format: uri
          example: https://www.site.com
        createdAt:
          type: string
          format: date-time
          example: "2026-04-21T14:00:00"
        updatedAt:
          type: string
          example: ""
        createdBy:
          type: string
          format: uuid
          example: 019db1b7-8a97-774f-92f2-53008ddfe195
    ItemGroupDetail:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
          example: 019db1c8-5c31-7dd3-b62e-63d8ec710d5c
        version:
          type: integer
          example: 1
        name:
          type: string
          example: wishlist
        budget:
          type: number
          format: float
          example: 6000.0
        budgetCurrency:
          type: string
          example: BRL
        createdAt:
          type: string
          format: date-time
          example: "2026-04-21T14:00:00"
        updatedAt:
          type: string
          example: ""
        createdBy:
          type: string
          format: uuid
          example: 019db1b7-8a97-774f-92f2-53008ddfe195
    SingleItemDetail:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
          example: 019db1b2-0d1d-76a7-835c-b20982484799
        version:
          type: integer
          example: 1
        title:
          type: string
          example: "Lenovo V4 GEN 5 (14` Intel)"
        imageURL:
          type: string
          format: uri
          example: https://www.site.com/image.png
        createdAt:
          type: string
          format: date-time
          example: "2026-04-21T14:00:00"
        updatedAt:
          type: string
          example: ""
        createdBy:
          type: string
          format: uuid
          example: 019db1b7-8a97-774f-92f2-53008ddfe195
        labels:
          type: array
          items:
            type: string
          example: []
        stores:
          type: array
          items:
            $ref: "#/components/schemas/ItemStoreDetail"
        groups:
          type: array
          items:
            $ref: "#/components/schemas/ItemGroupDetail"
    SingleItemResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/SingleItemDetail"
    ItemStore:
      type: object
      properties:
        name:
          type: string
          example: Lenovo.com
        price:
          type: number
          format: float
          example: 5174.99
    ItemDetail:
      type: object
      properties:
        uuid:
          type: string
          example: 019da83b-bc10-749g-8277-6bcde37013e0
        title:
          type: string
          example: "Lenovo V4 GEN 5 (14` Intel)"
        imageURL:
          type: string
          format: uri
          example: https://www.site.com/image.png
        labels:
          type: array
          items:
            type: string
          example:
            - computer
            - laptop
            - work
            - equipment
        stores:
          type: array
          items:
            $ref: "#/components/schemas/ItemStore"
        groups:
          type: array
          items:
            type: string
          example:
            - wishlist
    ItemDetailResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/ItemDetail"
    MailSubscription:
      required:
        - email
      type: object
      properties:
        email:
          type: string
          example: bob@bob.com
    GroupLabels:
      type: object
      properties:
        groupId:
          type: string
          format: uuid
          example: 019d91b3-12ab-773e-8f54-5162f6d87e56
        groupName:
          type: string
          example: wishlist
        labels:
          type: array
          items:
            type: string
          example:
            - computer
            - equipment
            - guitars
            - laptop
            - live
            - music
            - work
    GroupLabelsResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/GroupLabels"
    GroupItem:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
          example: 019da83a-ac99-738f-8266-5abec26012d9
        title:
          type: string
          example: Guitar Gibson Flying V
        price:
          type: number
          format: float
          example: 2300.0
        image:
          type: string
          format: uri
          example: https://domain.com/image.png
    GroupItemsResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/GroupItem"
