openapi: 3.0.4
info:
  title: Track to Buy - OpenAPI 3.1
  description: |-
    Routes for single tasks and Lambda functions integrations
  contact:
    email: hello@tracktobuy.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.12
x-amazon-apigateway-cors:
  allowOrigins:
    - "https://app.tracktobuy.com"
    - "https://tracktobuy.com"
    - "http://localhost"
    - "http://localhost:8080"
    - "http://localhost:3000"
  allowMethods:
    - GET
    - POST
    - OPTIONS
  allowHeaders:
    - Content-Type
    - Authorization
  maxAge: 300
tags:
  - name: Email Subscription
    description: Routes for email subscription like newsletter, updates and others
  - name: Groups
    description: Routes for group management, including labels
paths:
  /api/v1/mail-subscriptions:
    post:
      tags:
        - Email Subscription
      summary: Add new email to subscription database.
      description: Add new email to subscription database.
      operationId: addSubscription
      requestBody:
        description: Add new email to subscription database
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MailSubscription"
        required: true
      responses:
        "201":
          description: Successful created
        "400":
          description: Invalid input
        "500":
          description: Service unavailable
      x-amazon-apigateway-integration:
        uri: arn:aws:apigateway:us-east-2:lambda:path/2015-03-31/functions/arn:aws:lambda:us-east-2:947434607925:function:ttb-email-function/invocations
        httpMethod: POST
        type: aws_proxy
        passthroughBehavior: when_no_match
        payloadFormatVersion: "2.0"
    get:
      tags:
        - Email Subscription
      summary: Returns all the emails subscribed to the newsletter.
      description: Returns all the emails subscribed to the newsletter.
      operationId: getSubscriptions
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MailSubscription"
      x-amazon-apigateway-integration:
        uri: arn:aws:apigateway:us-east-2:lambda:path/2015-03-31/functions/arn:aws:lambda:us-east-2:947434607925:function:ttb-email-function/invocations
        httpMethod: POST
        type: aws_proxy
        passthroughBehavior: when_no_match
        payloadFormatVersion: "2.0"
  /api/v1/groups/{groupId}/labels:
    get:
      tags:
        - Groups
      summary: Returns labels associated with a group.
      description: Returns the group details and all labels associated with the
        specified group.
      operationId: getGroupLabels
      parameters:
        - name: groupId
          in: path
          required: true
          description: The unique identifier (UUID) of the group.
          schema:
            type: string
            format: uuid
            example: 019d91b3-12ab-773e-8f54-5162f6d87e56
        - name: Authorization
          in: header
          required: true
          description: Bearer JWT token for authentication.
          schema:
            type: string
            example: Bearer <token_jwt>
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupLabelsResponse"
        "401":
          description: Unauthorized - JWT token is missing or invalid
        "403":
          description: Forbidden - JWT token is expired or does not have permission
        "404":
          description: Group not found
        "500":
          description: Service unavailable

components:
  schemas:
    MailSubscription:
      required:
        - email
      type: object
      properties:
        email:
          type: string
          example: bob@bob.com
    GroupLabels:
      type: object
      properties:
        groupId:
          type: string
          format: uuid
          example: 019d91b3-12ab-773e-8f54-5162f6d87e56
        groupName:
          type: string
          example: wishlist
        labels:
          type: array
          items:
            type: string
          example:
            - computer
            - equipment
            - guitars
            - laptop
            - live
            - music
            - work
    GroupLabelsResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/GroupLabels"
